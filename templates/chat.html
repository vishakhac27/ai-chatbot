<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  
</head>

<body>
     <div class="blob blob1"></div>
    <div class="blob blob2"></div>



<div class="chat-wrapper">
    <div class="sidebar">

       <button class="new-chat-btn" onclick="newChat()">
    + New Chat
</button>

       <div class="chat-history" id="chatHistory"></div>
       <div class="back-btn"> 
        <a href="/" class="btn btn-light w-100">
         Back
      </a>
</div>
    </div>

    <div class="chat-card">

  
        <div class="chat-header">
            🤖 AI Chatbot
        </div>

   
        <div class="messages" id="messages"></div>

 
        <div class="input-box">
            <input id="input" placeholder="Ask something..." />
            <button onclick="send()">Send</button>
        </div>

    </div>

</div>

<script>

  

   let currentChatId = null;

async function send() {
    let input = document.getElementById("input");
    let msg = input.value.trim();

    if (!msg) return;

    let messages = document.getElementById("messages");

    messages.innerHTML += `
        <div class="msg user">${msg}</div>
    `;

    input.value = "";

    try {
        let res = await fetch("/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: msg,
                chat_id: currentChatId
            })
        });

        let data = await res.json();

        currentChatId = data.chat_id;

        let reply = data.reply;

        messages.innerHTML += `
            <div class="msg bot">

                <b>${reply.title || ""}</b><br><br>

                ${reply.summary || ""}<br><br>

                ${reply.points?.length ? `
                    <b>Key Points:</b><br>
                    ${reply.points.map(p => "• " + p).join("<br>")}
                    <br><br>
                ` : ""}

                ${reply.career ? `<b>Career:</b> ${reply.career}</div>` : ""}

            </div>
        `;

        messages.scrollTop = messages.scrollHeight;

    } catch (error) {
        console.error(error);
        messages.innerHTML += `
            <div class="msg bot" style="color:red;">
                Error: Could not get response
            </div>
        `;
    }
}


document.addEventListener("DOMContentLoaded", function () {
    document.getElementById("input").addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
            event.preventDefault();
            send();
        }
    });
});
  async function newChat() {
    let res = await fetch("/new-chat");
    let data = await res.json();

    document.getElementById("messages").innerHTML = "";

    loadHistory(); 
}

function loadHistory() {
    fetch("/history")
        .then(res => res.json())
        .then(data => {

            let container = document.getElementById("chatHistory");
            container.innerHTML = "";

            data.forEach(chat => {

                container.innerHTML += `
                    <div class="chat-item" data-id="${chat.id}">

                        <div class="chat-left" onclick="openChat('${chat.id}')">
                             ${chat.title}
                        </div>

                        <button class="delete-btn"
                            onclick="deleteChat('${chat.id}', event)">
                            🗑
                        </button>

                    </div>
                `;
            });
        });
}
async function newChat() {
    let res = await fetch("/new-chat");
    let data = await res.json();

    document.getElementById("messages").innerHTML = "";

    loadHistory(); 
}

async function autoOpenLastChat() {
    let res = await fetch("/history");
    let data = await res.json();

    if (data.length > 0) {
        let lastChat = data[data.length - 1];
        openChat(lastChat.id);
    }
}

async function deleteChat(chatId, event) {
    event.stopPropagation();

    try {
        let res = await fetch(`/delete-chat/${chatId}`, {
            method: "POST"
        });

        let data = await res.json();
        console.log("DELETE RESPONSE:", data);

        if (data.success) {
            loadHistory();  // refresh sidebar
            document.getElementById("messages").innerHTML = "";
        }

    } catch (error) {
        console.error("Delete failed:", error);
    }
}

window.onload = async function () {
    await loadHistory();
};
</script>

</body>
</html>
