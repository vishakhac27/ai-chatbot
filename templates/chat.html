<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  
</head>

<body>
     <div class="blob blob1"></div>
    <div class="blob blob2"></div>



<div class="chat-wrapper">
    <div class="sidebar">

        <button class="new-chat-btn">
            + New Chat
        </button>

        <div class="chat-history">
            <div class="chat-item">Chat 1</div>
            <div class="chat-item">Career Advice</div>
            <div class="chat-item">Python Learning</div>
        </div>
       <div class="back-btn"> 
        <a href="/" class="btn btn-light w-100">
         Back
      </a>
</div>
    </div>

    <div class="chat-card">

  
        <div class="chat-header">
            🤖 AI Chatbot
        </div>

   
        <div class="messages" id="messages"></div>

 
        <div class="input-box">
            <input id="input" placeholder="Ask something..." />
            <button onclick="send()">Send</button>
        </div>

    </div>

</div>

<script>
async function send() {
    let input = document.getElementById("input");
    let msg = input.value.trim();

    if (!msg) return;

    let messages = document.getElementById("messages");

    // USER MESSAGE
    messages.innerHTML += `
        <div class="msg user">${msg}</div>
    `;

    input.value = "";

    // Scroll update
    messages.scrollTop = messages.scrollHeight;

    try {
        let res = await fetch("/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message: msg })
        });

        let data = await res.json();

        let reply = data.reply;

   
        messages.innerHTML += `
            <div class="msg bot">

                ${reply.title ? `<b>${reply.title}</b><br><br>` : ""}

                ${reply.summary || ""}<br><br>

                ${reply.points && reply.points.length ? `
                    <b>Key Points:</b><br>
                    ${reply.points.map(p => `• ${p}`).join("<br>")}
                    <br><br>
                ` : ""}

                ${reply.career ? `<b>Career:</b> ${reply.career}` : ""}

            </div>
        `;

        messages.scrollTop = messages.scrollHeight;

    } catch (error) {
        messages.innerHTML += `
            <div class="msg bot" style="color:red;">
                Error: Could not get response
            </div>
        `;
    }
}


document.getElementById("input").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        send();
    }
});
</script>

</body>
</html>
